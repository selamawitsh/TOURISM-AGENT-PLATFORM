    name: ai-service
    runtime: go
    plan: free
    rootDir: backend/services/ai-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
    envVars:
      - key: PORT
        value: 8090
      - key: APP_ENV
        value: production
      - key: DESTINATION_SERVICE_URL
        value: http://destination-service:8083
      - key: BOOKING_SERVICE_URL
        value: http://booking-service:8084
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false