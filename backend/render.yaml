      - key: PORT
        value: 8086
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Payment Service
  - type: web
    name: payment-service
    runtime: go
    plan: free
    rootDir: backend/services/payment-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
    envVars:
      - key: PORT
        value: 8087
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Analytics Service
  - type: web
    name: analytics-service
    runtime: go
    plan: free
    rootDir: backend/services/analytics-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
