# backend/render.yaml
services:
  # API Gateway
  - type: web
    name: gateway
    runtime: go
    plan: free
    rootDir: ./
    buildCommand: |
      cd backend/gateway
      go mod download
      go build -tags netgo -ldflags '-s -w' -o app
    startCommand: ./backend/gateway/app
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: AUTH_SERVICE_URL
        value: http://auth-service:8081
      - key: USER_SERVICE_URL
        value: http://user-service:8082
      - key: DESTINATION_SERVICE_URL
        value: http://destination-service:8083
      - key: BOOKING_SERVICE_URL
        value: http://booking-service:8084
      - key: FAVORITES_SERVICE_URL
        value: http://favorites-service:8085
      - key: REVIEW_SERVICE_URL
        value: http://review-service:8086
      - key: PAYMENT_SERVICE_URL
        value: http://payment-service:8087
      - key: ANALYTICS_SERVICE_URL
        value: http://analytics-service:8088

  # Auth Service
  - type: web
    name: auth-service
    runtime: go
    plan: free
    rootDir: ./
    buildCommand: |
      cd backend/services/auth-service
      go mod download
      go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./backend/services/auth-service/app
    envVars:
      - key: PORT
        value: 8081
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # User Service
