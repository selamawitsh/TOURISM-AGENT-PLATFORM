# backend/render.yaml
services:
  # API Gateway
  - type: web
    name: gateway
    runtime: go
    plan: free
    rootDir: backend/gateway
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://tourism-frontend-kappa.vercel.app,https://tourism-frontend-22tgbmuz7-selamawitshs-projects.vercel.app"
      - key: AUTH_SERVICE_URL
        value: http://auth-service:8081
      - key: USER_SERVICE_URL
        value: http://user-service:8082
      - key: DESTINATION_SERVICE_URL
        value: http://destination-service:8083
      - key: BOOKING_SERVICE_URL
        value: http://booking-service:8084
      - key: FAVORITES_SERVICE_URL
        value: http://favorites-service:8085
      - key: REVIEW_SERVICE_URL
        value: http://review-service:8086
      - key: PAYMENT_SERVICE_URL
        value: http://payment-service:8087
      - key: ANALYTICS_SERVICE_URL
        value: http://analytics-service:8088
      - key: AI_SERVICE_URL
        value: http://ai-service:8090

  # Auth Service
  - type: web
    name: auth-service
    runtime: go
    plan: free
    rootDir: backend/services/auth-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
    envVars:
      - key: PORT
        value: 8081
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # User Service
  - type: web
    name: user-service
    runtime: go
    plan: free
    rootDir: backend/services/user-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
    envVars:
      - key: PORT
        value: 8082
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Destination Service
  - type: web
    name: destination-service
    runtime: go
    plan: free
    rootDir: backend/services/destination-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
    envVars:
      - key: PORT
        value: 8083
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Booking Service
  - type: web
    name: booking-service
    runtime: go
    plan: free
    rootDir: backend/services/booking-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
    envVars:
      - key: PORT
        value: 8084
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Favorites Service
  - type: web
    name: favorites-service
    runtime: go
    plan: free
    rootDir: backend/services/favorites-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
    startCommand: ./app
    envVars:
      - key: PORT
        value: 8085
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Review Service
  - type: web
    name: review-service
    runtime: go
    plan: free
    rootDir: backend/services/review-service
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/...
